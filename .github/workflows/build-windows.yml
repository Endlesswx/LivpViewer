name: build-windows

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v3
      - name: Build
        shell: pwsh
        env:
          PUB_HOSTED_URL: https://pub.dev
          FLUTTER_STORAGE_BASE_URL: https://storage.googleapis.com
          PYTHONUTF8: "1"
          PYTHONIOENCODING: "utf-8"
          FLET_CLI_NO_RICH_OUTPUT: "1"
          CI: "1"
        run: uv run flet build windows --yes --no-rich-output
      - uses: actions/upload-artifact@v4
        with:
          name: windows-exe
          path: build/windows

      - name: Get version
        id: version
        shell: bash
        run: |
          VERSION=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Package release zip
        shell: pwsh
        run: Compress-Archive -Path build/windows/* -DestinationPath LivpViewer-${{ steps.version.outputs.version }}.zip

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: Livp Viewer v${{ steps.version.outputs.version }}
          generate_release_notes: true
          files: LivpViewer-${{ steps.version.outputs.version }}.zip
